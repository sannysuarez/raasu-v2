{% extends "base.html" %}

{% block title %}Analytics - RAASU POS{% endblock %}

{% block content %}
<h1 class="mb-4">
    <i class="fas fa-chart-bar"></i> Sales Analytics
</h1>

<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0">30-Day Daily Sales Comparison</h5>
            </div>
            <div class="card-body">
                <canvas id="salesChart" style="max-height: 400px;"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
fetch('/sales/analytics/daily')
    .then(response => {
        if (!response.ok) {
            throw new Error(`API error: ${response.status}`);
        }
        return response.json();
    })
    .then(data => {
        console.log('Analytics data:', data);
        
        if (!data.dates || !data.totals || data.dates.length === 0) {
            document.getElementById('salesChart').innerHTML = '<p class="text-muted text-center mt-5">No sales data available</p>';
            return;
        }
        
        const ctx = document.getElementById('salesChart').getContext('2d');
        const labels = data.dates.map(date => {
            const d = new Date(date + 'T00:00:00Z');
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        });
        
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Daily Sales (₦)',
                    data: data.totals,
                    backgroundColor: '#2563eb',
                    borderColor: '#1e40af',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        display: true,
                        position: 'top'
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function(value) {
                                return '₦' + Number(value).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
                            }
                        }
                    }
                }
            }
        });
    })
    .catch(error => {
        console.error('Error loading analytics:', error);
        document.getElementById('salesChart').innerHTML = '<p class="text-danger text-center mt-5">Error loading chart: ' + error.message + '</p>';
    });
</script>
{% endblock %}
