{% extends "base.html" %}

{% block title %}Login - RAASU POS{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="col-md-5">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <img src="{{ url_for('static', filename='favicon_io/favicon-32x32.png') }}" alt="Logo" class="img-fluid" style="max-height: 40px;">
                        <h3>Ra'asu Login</h3>
                        <p class="text-muted">Web-based Thermal Printer System</p>
                    </div>
                    
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input class="form-control" type="text" id="username" name="username" required autofocus>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input class="form-control" type="password" id="password" name="password" required>
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input class="form-check-input" type="checkbox" id="remember" name="remember">
                            <label class="form-check-label" for="remember">
                                Remember me
                            </label>
                        </div>
                        
                        <button class="btn btn-primary w-100 mb-3" type="submit">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </form>
                    
                    <hr>
                    <!-- Demo credentials for testing -->
                     
                   <!-- <div class="alert alert-info" role="alert">
                        <small>
                            <strong>Demo Credentials:</strong><br>
                            Admin: admin / admin123<br>
                            User: user1 / user123
                        </small>
                    </div> -->
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    body {
        background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
        margin: 0;
        padding: 0;
    }
</style>
{% endblock %}
